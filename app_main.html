<html lang="zh-Hant">

<meta charset="UTF-8">

<title>易經起卦 — 漢字版</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:  #C8A96E;
    --dark:  #1A1A1A;
    --panel: #242424;
    --card:  #2E2E2E;
    --dim:   #888888;
    --white: #EFEFEF;
    --red:   #E06060;
    --green: #82C882;
    --blue:  #7090C0;
    --sep:   #3A3A3A;
  }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: "Songti SC", "Source Han Serif TC", "Noto Serif CJK TC", serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 標題列 ── */
  header {
    background: var(--panel);
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    flex-shrink: 0;
  }
  header h1 { font-size: 22px; color: var(--gold); letter-spacing: .2em; }
  #clock { font-size: 13px; color: var(--dim); }

  /* ── 輸入區 ── */
  .inp-panel {
    background: var(--panel);
    border-radius: 12px;
    margin: 16px 20px 0;
    padding: 10px 16px 12px;
    flex-shrink: 0;
  }
  .inp-panel label { font-size: 13px; color: var(--dim); display: block; margin-bottom: 6px; }
  .inp-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #charInput {
    width: 120px; height: 56px;
    background: var(--card);
    border: 2px solid var(--gold);
    border-radius: 8px;
    color: var(--white);
    font-family: inherit;
    font-size: 28px;
    text-align: center;
    outline: none;
  }
  #charInput::placeholder { color: var(--dim); }
  #charInput:focus { border-color: #e0c080; }
  #goBtn {
    height: 56px; padding: 0 24px;
    background: var(--gold);
    border: none; border-radius: 8px;
    color: var(--dark);
    font-family: inherit;
    font-size: 16px; font-weight: bold;
    cursor: pointer;
    transition: background .15s;
  }
  #goBtn:hover { background: #A8893E; }
  #goBtn:disabled { opacity: .5; cursor: default; }
  #errMsg { font-size: 13px; color: var(--red); }
  #loadMsg { font-size: 13px; color: var(--dim); }

  /* ── 結果捲動區 ── */
  #results {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
  }

  /* ── 單筆結果卡 ── */
  .result-card {
    background: var(--panel);
    border-radius: 14px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  /* 推算說明列 */
  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 14px 20px 10px;
  }
  .char-big {
    font-size: 52px; font-weight: bold;
    color: var(--gold);
    min-width: 72px;
    line-height: 1;
    padding-top: 4px;
  }
  .info-lines { display: flex; flex-direction: column; gap: 3px; font-size: 13px; }
  .info-lines .dim  { color: var(--dim); }
  .info-lines .gold { color: var(--gold); }
  .info-lines .wht  { color: var(--white); }

  .sep-line { height: 1px; background: var(--sep); margin: 0 20px; }

  /* ── 卦象雙欄 ── */
  .hex-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    padding: 12px 20px;
    align-items: start;
  }

  /* 變爻說明 */
  .mid-col {
    display: flex; flex-direction: column;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    min-width: 72px;
    padding-top: 80px;
  }
  .mid-col .arrow   { font-size: 26px; color: var(--gold); }
  .mid-col .calc    { font-size: 11px; color: var(--dim); text-align: center; line-height: 1.6; }
  .mid-col .yaopos  { font-size: 13px; color: var(--white); }
  .mid-col .yaotype { font-size: 13px; color: var(--gold); }

  /* 單張卦牌 */
  .hex-card {
    background: var(--card);
    border-radius: 10px;
    padding: 10px 10px 0;
    display: flex; flex-direction: column;
    align-items: center;
  }
  .hex-card .card-title { font-size: 13px; color: var(--dim); margin-bottom: 2px; }
  .hex-card .card-sym   { font-size: 36px; color: var(--gold); line-height: 1.1; }
  .hex-card .card-no    { font-size: 13px; color: var(--dim); margin-bottom: 2px; }
  .hex-card .card-name  { font-size: 17px; font-weight: bold; color: var(--white); margin-bottom: 8px; }

  /* 爻行 */
  .yao-row {
    display: flex; align-items: center;
    width: 100%;
    padding: 2px 4px;
    gap: 4px;
  }
  .yao-line {
    font-family: "Menlo", monospace;
    font-size: 14px;
    width: 130px;
    flex-shrink: 0;
  }
  .yao-label {
    font-family: "Menlo", monospace;
    font-size: 11px;
    width: 52px;
    flex-shrink: 0;
  }
  .yao-pred { font-size: 13px; font-weight: bold; width: 22px; }

  /* 評分列 */
  .score-sep { height: 1px; background: var(--sep); margin: 6px 8px 4px; width: calc(100% - 16px); }
  .score-bar { font-size: 12px; padding-bottom: 8px; text-align: center; }
</style>
</head>

</div>

//  工具函式
// ════════════════════════════════════════════
function mod8(n) { const r = ((n % 8) + 8) % 8; return r === 0 ? 8 : r; }

function getDizhi() {
  const h = new Date().getHours();
  let idx = (h === 23 || h === 0) ? 1 : Math.floor((h + 1) / 2) + 1;
  const [name, period] = DIZHI[idx];
  return [idx, name, period];
}

function hexScoreLabel(positions) {
  const total = positions.reduce((a,b)=>a+b, 0);
  for (const [th, lbl] of SCORE_LABEL) if (total >= th) return [total, lbl];
  return [total, "凶卦"];
}
function scoreColor(s) {
  return s > 0 ? "var(--green)" : s < 0 ? "var(--red)" : "var(--gold)";
}

//  起卦邏輯
// ════════════════════════════════════════════
function computeChar(char) {
  const entry = lookupChar(char);
  if (!entry) return null;
  const [radicalNum, additional, isSimp] = entry;
  const [radStrokes, radChar] = KANGXI_RADICALS[radicalNum];
  const total = radStrokes + additional;

  const upperNum = mod8(total);
  const [upperName, upperSym] = BAGUA[upperNum];

  const [dzIdx, dzName, dzPeriod] = getDizhi();
  const dzMod = mod8(dzIdx);
  const lowerNum = mod8(upperNum + dzMod);
  const [lowerName, lowerSym] = BAGUA[lowerNum];

  const [hexNo, hexName] = HEXAGRAMS[`${upperNum},${lowerNum}`];

  const rawSum = total + dzIdx;
  const yaoPos = rawSum % 6 || 6;
  const allYao = [...TRIGRAM_BITS[lowerNum], ...TRIGRAM_BITS[upperNum]];
  const originalYao = allYao[yaoPos - 1];
  allYao[yaoPos - 1] = 1 - originalYao;

  const zhiLowerNum = BITS_TO_TRIGRAM[allYao.slice(0,3).join(",")];
  const zhiUpperNum = BITS_TO_TRIGRAM[allYao.slice(3,6).join(",")];
  const [zhiHexNo, zhiHexName] = HEXAGRAMS[`${zhiUpperNum},${zhiLowerNum}`];
  const [, zhiUpperSym] = BAGUA[zhiUpperNum];
  const [, zhiLowerSym] = BAGUA[zhiLowerNum];

  return {
    char, radicalNum, radChar, radStrokes, additional, total,
    isSimp: !!isSimp,
    upperNum, upperName, upperSym,
    dzIdx, dzName, dzPeriod, dzMod,
    lowerNum, lowerName, lowerSym,
    hexNo, hexName,
    yaoPos, originalYao,
    zhiHexNo, zhiHexName, zhiUpperSym, zhiLowerSym,
    allYaoBefore: [...TRIGRAM_BITS[lowerNum], ...TRIGRAM_BITS[upperNum]],
    allYaoAfter: allYao,
    zhiLowerNum, zhiUpperNum
  };
}

// ════════════════════════════════════════════
//  UI 建構
// ════════════════════════════════════════════
function buildYaoRow(isYang, pos, isMark, predV) {
  const row = document.createElement("div");
  row.className = "yao-row";

  const line = document.createElement("span");
  line.className = "yao-line";
  line.textContent = isYang ? "────────" : "────  ────";
  line.style.color = isMark ? "var(--red)" : (isYang ? "var(--gold)" : "var(--blue)");

  const lbl = document.createElement("span");
  lbl.className = "yao-label";
  lbl.textContent = `第${pos}爻` + (isMark ? " ←" : "");
  lbl.style.color = isMark ? "var(--red)" : "var(--dim)";

  row.appendChild(line);
  row.appendChild(lbl);

  if (predV !== null) {
    const p = document.createElement("span");
    p.className = "yao-pred";
    const k = String(predV);
    p.textContent = PRED_LABEL[k];
    p.style.color  = PRED_COLOR[k];
    row.appendChild(p);
  }
  return row;
}

function buildHexCard(title, sym, no, name, bits, mark, yaoPred) {
  const card = document.createElement("div");
  card.className = "hex-card";

  const mk = (cls, txt) => { const e = document.createElement("div"); e.className=cls; e.textContent=txt; return e; };
  card.appendChild(mk("card-title", title));
  card.appendChild(mk("card-sym",   sym));
  card.appendChild(mk("card-no",    `第 ${String(no).padStart(2,"0")} 卦`));
  card.appendChild(mk("card-name",  name));

  for (let i = 5; i >= 0; i--) {
    const pos = i + 1;
    card.appendChild(buildYaoRow(
      bits[i] === 1, pos,
      mark != null && pos === mark,
      yaoPred ? yaoPred[i] : null
    ));
  }

  if (yaoPred) {
    const [score, scoreLbl] = hexScoreLabel(yaoPred);
    const ji  = yaoPred.filter(v=>v===1).length;
    const xng = yaoPred.filter(v=>v===-1).length;
    const sep = document.createElement("div"); sep.className = "score-sep"; card.appendChild(sep);
    const sb  = document.createElement("div"); sb.className  = "score-bar";
    sb.textContent = `${scoreLbl}　吉${ji} 中${6-ji-xng} 凶${xng}（${score>=0?"+"+score:score}）`;
    sb.style.color = scoreColor(score);
    card.appendChild(sb);
  }
  return card;
}

function renderResult(r) {
  const benPred = HEXAGRAM_LOOKUP[`${r.lowerName},${r.upperName}`] ?? null;
  const zhiInner = BAGUA[r.zhiLowerNum][0];
  const zhiOuter = BAGUA[r.zhiUpperNum][0];
  const zhiPred  = HEXAGRAM_LOOKUP[`${zhiInner},${zhiOuter}`] ?? null;

  const card = document.createElement("div");
  card.className = "result-card";

  // 推算說明
  const infoRow = document.createElement("div");
  infoRow.className = "info-row";

  const charBig = document.createElement("div");
  charBig.className = "char-big";
  charBig.textContent = r.char;

  const lines = document.createElement("div");
  lines.className = "info-lines";
  const ln = (cls, txt) => { const s=document.createElement("span"); s.className=cls; s.textContent=txt; lines.appendChild(s); };
  const simpNote = r.isSimp ? "（省略形）" : "";
  ln("dim",  `康熙部首　第 ${r.radicalNum} 部「${r.radChar}」${simpNote}`);
  ln("wht",  `部首 ${r.radStrokes} 畫 ＋ 部首外 ${r.additional} 畫 ＝ 共 ${r.total} 畫`);
  ln("gold", `${r.total} ÷ 8 餘 ${r.upperNum}　上卦 → ${r.upperSym} ${r.upperName}`);
  ln("dim",  `時辰 ${r.dzName}（${r.dzPeriod}）編號 ${r.dzIdx}，÷ 8 餘 ${r.dzMod}　下卦 → ${r.lowerSym} ${r.lowerName}`);

  infoRow.appendChild(charBig);
  infoRow.appendChild(lines);
  card.appendChild(infoRow);

  const sep = document.createElement("div"); sep.className = "sep-line"; card.appendChild(sep);

  // 卦象雙欄
  const hexRow = document.createElement("div");
  hexRow.className = "hex-row";

  hexRow.appendChild(buildHexCard(
    "本  卦", `${r.upperSym}${r.lowerSym}`,
    r.hexNo, r.hexName, r.allYaoBefore, r.yaoPos, benPred
  ));

  const mid = document.createElement("div");
  mid.className = "mid-col";
  const yaoType = r.originalYao === 1 ? "陽爻" : "陰爻";
  const yaoNew  = r.originalYao === 1 ? "陰爻" : "陽爻";
  mid.innerHTML = `
    <div class="arrow">→</div>
    <div class="calc">(${r.total}+${r.dzIdx}) ÷ 6<br>餘 ${r.yaoPos}</div>
    <div class="yaopos">第${r.yaoPos}爻</div>
    <div class="yaotype">${yaoType}→${yaoNew}</div>
  `;
  hexRow.appendChild(mid);

  hexRow.appendChild(buildHexCard(
    "之  卦", `${r.zhiUpperSym}${r.zhiLowerSym}`,
    r.zhiHexNo, r.zhiHexName, r.allYaoAfter, null, zhiPred
  ));

  card.appendChild(hexRow);
  return card;
}

// ════════════════════════════════════════════
//  事件 & 時鐘
// ════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const [, dzName, dzPeriod] = getDizhi();
  const pad = n => String(n).padStart(2,"0");
  document.getElementById("clock").textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}　${dzName}時 ${dzPeriod}`;
}
setInterval(updateClock, 1000);
updateClock();

function isHanzi(cp) {
  return (cp >= 0x4E00 && cp <= 0x9FFF) ||
         (cp >= 0x3400 && cp <= 0x4DBF) ||
         (cp >= 0xF900 && cp <= 0xFAFF);
}

function onQuery() {
  const err = document.getElementById("errMsg");
  err.textContent = "";
  const text = document.getElementById("charInput").value.trim();
  if (!text) return;

  const results = document.getElementById("results");
  results.innerHTML = "";

  let anyOk = false;
  for (const ch of [...text]) {
    const cp = ch.codePointAt(0);
    if (!isHanzi(cp)) { err.textContent = `「${ch}」不是漢字`; continue; }
    const r = computeChar(ch);
    if (!r) { err.textContent = `「${ch}」查無資料`; continue; }
    results.appendChild(renderResult(r));
    anyOk = true;
  }
}

document.getElementById("goBtn").addEventListener("click", onQuery);
document.getElementById("charInput").addEventListener("keydown", e => {
  if (e.key === "Enter") onQuery();
});

// 資料已內嵌
loadKangxi();
</script>
