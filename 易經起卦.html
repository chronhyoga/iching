<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>易經起卦</title>
<style>
:root{
  --gold:#C8A96E;--dark:#141414;--panel:#1E1E1E;--card:#272727;
  --dim:#888;--white:#EFEFEF;--red:#E06060;--blue:#7090C0;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dark);color:var(--white);
  font-family:"Songti SC","STSong","Noto Serif CJK TC",serif;
  overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:600px;margin:0 auto;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--panel);border-bottom:1px solid #333;}
header h1{font-size:20px;color:var(--gold);letter-spacing:6px;font-weight:700;}
#clock{font-size:12px;color:var(--dim);text-align:right;line-height:1.6;}

/* Input */
.input-wrap{padding:16px 20px;background:var(--panel);border-bottom:1px solid #222;}
.input-row{display:flex;gap:10px;align-items:center;}
#char-input{
  flex:0 0 72px;height:64px;font-size:36px;text-align:center;
  background:var(--card);border:2px solid var(--gold);border-radius:10px;
  color:var(--white);outline:none;caret-color:var(--gold);
  font-family:inherit;
}
#char-input:focus{border-color:#E8C97E;box-shadow:0 0 0 3px rgba(200,169,110,.2);}
.btn{
  flex:0 0 80px;height:64px;font-size:18px;font-weight:700;
  background:var(--gold);color:#111;border:none;border-radius:10px;cursor:pointer;
  font-family:inherit;letter-spacing:2px;
  transition:background .15s,transform .1s;
}
.btn:active{background:#A8893E;transform:scale(.97);}
#err{font-size:13px;color:var(--red);flex:1;}

/* Scroll */
#results{flex:1;overflow-y:auto;padding:16px 16px 40px;display:flex;flex-direction:column;gap:16px;}

/* Card */
.gua-card{background:var(--panel);border-radius:var(--radius);overflow:hidden;}
.gua-card-header{display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid #333;}
.char-big{font-size:52px;color:var(--gold);line-height:1;min-width:56px;text-align:center;}
.info-block{flex:1;display:flex;flex-direction:column;gap:3px;}
.info-row{font-size:13px;color:var(--dim);}
.info-row span{color:var(--white);}
.info-row.highlight{color:var(--gold);font-size:14px;}

/* Hexagram panels */
.hex-row{display:grid;grid-template-columns:1fr auto 1fr;gap:0;padding:12px 10px 16px;}
.hex-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
.hex-label{font-size:12px;color:var(--dim);letter-spacing:2px;}
.hex-sym{font-size:34px;color:var(--gold);}
.hex-no{font-size:12px;color:var(--dim);}
.hex-name{font-size:17px;font-weight:700;color:var(--white);margin-bottom:6px;}
.yao-lines{display:flex;flex-direction:column;gap:5px;margin-top:2px;}
.yao-row{display:flex;align-items:center;gap:6px;}
.yao-bar{
  font-size:13px;font-family:Menlo,monospace;letter-spacing:1px;
  min-width:100px;text-align:center;
}
.yao-bar.yang{color:var(--gold);}
.yao-bar.yin{color:var(--blue);}
.yao-bar.change{color:var(--red);}
.yao-num{font-size:11px;color:var(--dim);min-width:26px;}
.yao-mark{font-size:11px;color:var(--red);}

/* Arrow middle */
.hex-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 4px;gap:6px;}
.arrow{font-size:22px;color:var(--gold);}
.mid-info{font-size:11px;color:var(--dim);text-align:center;line-height:1.7;}
.mid-info strong{color:var(--gold);}

.divider{height:1px;background:#333;margin:0 18px;}

/* Empty state */
.empty{text-align:center;color:var(--dim);padding:60px 20px;font-size:15px;line-height:2;}
.empty .big{font-size:48px;display:block;margin-bottom:12px;}
</style>
</head>
<body>
<header>
  <h1>易 經 起 卦</h1>
  <div id="clock"></div>
</header>

<div class="input-wrap">
  <div class="input-row">
    <input id="char-input" type="text" maxlength="4" placeholder="字"
           inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="btn" onclick="doQuery()">起卦</button>
    <div id="err"></div>
  </div>
</div>

<div id="results">
  <div class="empty">
    <span class="big">☯</span>
    輸入一個漢字<br>取得本卦與之卦
  </div>
</div>

      const rad = bin.charCodeAt(i);
      if (rad === 0) continue;
      const b2  = bin.charCodeAt(i + 1);
      const add  = b2 & 0x7F;
      const simp = !!(b2 & 0x80);
      unihanMap.set(seg.start + (i >> 1), [rad, add, simp]);
    }
  }
}

// ═══════════════════════════════════════════
//  十二地支
// ═══════════════════════════════════════════
const DIZHI = {
  1:['子','23:00–01:00'], 2:['丑','01:00–03:00'], 3:['寅','03:00–05:00'],
  4:['卯','05:00–07:00'], 5:['辰','07:00–09:00'], 6:['巳','09:00–11:00'],
  7:['午','11:00–13:00'], 8:['未','13:00–15:00'], 9:['申','15:00–17:00'],
  10:['酉','17:00–19:00'],11:['戌','19:00–21:00'],12:['亥','21:00–23:00'],
};

function getDizhi() {
  const h = new Date().getHours();
  let idx = (h === 23 || h === 0) ? 1 : Math.floor((h + 1) / 2) + 1;
  return [idx, ...DIZHI[idx]];
}

function mod8(n) { const r = n % 8; return r === 0 ? 8 : r; }
function mod6(n) { const r = n % 6; return r === 0 ? 6 : r; }

// ═══════════════════════════════════════════
//  CLOCK
// ═══════════════════════════════════════════
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const [idx, name, period] = getDizhi();
  document.getElementById('clock').innerHTML =
    `${hh}:${mm}:${ss}<br>${name}時 ${period}`;
}
updateClock();
setInterval(updateClock, 1000);

// ═══════════════════════════════════════════
//  QUERY
// ═══════════════════════════════════════════
document.getElementById('char-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doQuery();
});

function doQuery() {
  initUnihan();
  const raw = document.getElementById('char-input').value.trim();
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!raw) return;

  const results = [];
  for (const ch of [...raw]) {
    const cp = ch.codePointAt(0);
    if (!((cp >= 0x3400 && cp <= 0x4DBF) ||
          (cp >= 0x4E00 && cp <= 0x9FFF) ||
          (cp >= 0xF900 && cp <= 0xFAFF) ||
          (cp >= 0x20000 && cp <= 0x2A6DF))) {
      errEl.textContent = `「${ch}」不是漢字`;
      continue;
    }
    const entry = unihanMap.get(cp);
    if (!entry) { errEl.textContent = `「${ch}」查無資料`; continue; }

    const [radNum, add, simp] = entry;
    const [radStk, radCh] = KANGXI_RADICALS[radNum] || [0,'?'];
    const total = radStk + add;

    const upperNum = mod8(total);
    const [upperName, upperSym] = BAGUA[upperNum];

    const [dzIdx, dzName, dzPeriod] = getDizhi();
    const dzMod = mod8(dzIdx);
    const lowerNum = mod8(upperNum + dzMod);
    const [lowerName, lowerSym] = BAGUA[lowerNum];

    const [hexNo, hexName] = HEXAGRAMS[`${upperNum},${lowerNum}`];

    // 之卦
    const rawSum = total + dzIdx;
    const yaoPos = mod6(rawSum);
    const allYao = [...TRIGRAM_BITS[lowerNum], ...TRIGRAM_BITS[upperNum]];
    const origYao = allYao[yaoPos - 1];
    allYao[yaoPos - 1] = 1 - origYao;
    const zhiLowerNum = BITS_TO_GUA[allYao.slice(0,3).join('')];
    const zhiUpperNum = BITS_TO_GUA[allYao.slice(3,6).join('')];
    const [zhiNo, zhiName] = HEXAGRAMS[`${zhiUpperNum},${zhiLowerNum}`];
    const [,zhiUpperSym] = BAGUA[zhiUpperNum];
    const [,zhiLowerSym] = BAGUA[zhiLowerNum];

    const beforeYao = [...TRIGRAM_BITS[lowerNum], ...TRIGRAM_BITS[upperNum]];
    results.push({
      ch, cp, radNum, radCh, radStk, add, total, simp,
      upperNum, upperName, upperSym,
      dzIdx, dzName, dzPeriod, dzMod,
      lowerNum, lowerName, lowerSym,
      hexNo, hexName,
      yaoPos, origYao,
      zhiNo, zhiName, zhiUpperSym, zhiLowerSym, zhiUpperNum, zhiLowerNum,
      beforeYao, afterYao: allYao,
    });
  }

  renderResults(results);
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderResults(results) {
  const container = document.getElementById('results');
  container.innerHTML = '';
  if (!results.length) return;

  for (const r of results) {
    const card = document.createElement('div');
    card.className = 'gua-card';

    // ── Header ──────────────────────────────
    const simpNote = r.simp ? '（省略形）' : '';
    card.innerHTML = `
<div class="gua-card-header">
  <div class="char-big">${r.ch}</div>
  <div class="info-block">
    <div class="info-row">康熙部首　第 ${r.radNum} 部「${r.radCh}」${simpNote}</div>
    <div class="info-row">部首 <span>${r.radStk}</span> 畫 ＋ 部首外 <span>${r.add}</span> 畫 ＝ 共 <span>${r.total}</span> 畫</div>
    <div class="info-row highlight">${r.total} ÷ 8 餘 ${r.upperNum} → 上卦 ${r.upperSym}${r.upperName}</div>
    <div class="info-row">${r.dzName}時（${r.dzPeriod}）編號 ${r.dzIdx}，÷ 8 餘 ${r.dzMod} → 下卦 ${r.lowerSym}${r.lowerName}</div>
  </div>
</div>
<div class="divider"></div>
<div class="hex-row">
  ${hexPanel('本卦', r.upperSym+r.lowerSym, r.hexNo, r.hexName, r.beforeYao, r.yaoPos)}
  <div class="hex-mid">
    <div class="arrow">→</div>
    <div class="mid-info">
      (${r.total}+${r.dzIdx}) ÷ 6<br>
      餘 ${r.yaoPos}<br>
      第${r.yaoPos}爻<br>
      <strong>${r.origYao===1?'陽→陰':'陰→陽'}</strong>
    </div>
  </div>
  ${hexPanel('之卦', r.zhiUpperSym+r.zhiLowerSym, r.zhiNo, r.zhiName, r.afterYao, null)}
</div>`;

    container.appendChild(card);
  }
}

function hexPanel(title, syms, no, name, bits, markPos) {
  // bits[0]=第1爻底，bits[5]=第6爻頂；顯示時第6爻在上
  let yaos = '';
  for (let i = 5; i >= 0; i--) {
    const isYang = bits[i] === 1;
    const isMark = (markPos !== null) && (i + 1 === markPos);
    const cls = isMark ? 'change' : (isYang ? 'yang' : 'yin');
    const bar = isYang ? '━━━━━━━━' : '━━━━  ━━━━';
    const markTxt = isMark ? `<span class="yao-mark"> ←</span>` : '';
    yaos += `<div class="yao-row">
      <span class="yao-bar ${cls}">${bar}</span>
      <span class="yao-num">${i+1}</span>${markTxt}
    </div>`;
  }
  return `<div class="hex-panel">
    <div class="hex-label">${title}</div>
    <div class="hex-sym">${syms}</div>
    <div class="hex-no">第 ${String(no).padStart(2,'0')} 卦</div>
    <div class="hex-name">${name}</div>
    <div class="yao-lines">${yaos}</div>
  </div>`;
}
